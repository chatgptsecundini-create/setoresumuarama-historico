<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<title>REGIC Epidemiológica</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html,body,#map{

height:100%;

margin:0;

padding:0;

}

#titulo{

position:absolute;

top:10px;

left:50px;

z-index:1000;

background:white;

padding:10px;

border-radius:10px;

font-weight:bold;

}

</style>

</head>

<body>

<div id="titulo">

🕸 REGIC Epidemiológica

</div>

<div id="map"></div>

<script>

var map =
L.map('map')
.setView([-23.76,-53.31],12);

var dadosHistoricos = [];

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

fetch(
'https://script.google.com/macros/s/AKfycbyxSiXHCc27JvgN3jUVo4H4nT7yvVDx58S_nyjoQytV7Q9z_GNA90RUdu5e2v0-1pIi/exec'
)

.then(response => response.json())

.then(data => {

dadosHistoricos = data;

console.log(
'Dados históricos:',
dadosHistoricos.length
);

});

fetch('limites_setores_lookerstudio.geojson')

.then(response => response.json())

.then(data => {

L.geoJSON(data,{

style:function(){

return{

color:'black',

weight:1,

fillColor:'#cccccc',

fillOpacity:0.5

};

}

}).addTo(map);

});

</script>

</body>

</html>
